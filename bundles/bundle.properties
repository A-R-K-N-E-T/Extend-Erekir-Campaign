## sectors
sector.eec-slag-coast.name = Slag Coast
sector.eec-slag-coast.description = A sector with access to the Slag Sea, full of rocks and islands. The sector's location is ideal for raiding naval bases, but the enemy has already established a stronghold here. Destroy the enemy. Increase tungsten production.

sector.eec-Canyon.name = Canyon
sector.eec-Canyon.description = A canyon connecting two enemy bases via the Three Paths. It contains an unremarkable enemy base, apparently built quite recently and likely to be reinforced in the near future. Destroy it before the enemies become stronger.

sector.eec-Threeways.name = Threeways
sector.eec-Threeways.description = This sector is quite rich in resources, but the enemy doesn't want to allow it to be captured, so they will do everything they can to destroy you. \nWe've also researched the [accent]drill acceleration technology. Try it out.

sector.eec-Northern-Cave.name = Northern Cave
sector.eec-Northern-Cave.description = Another sector with Malis structures. It has very strong defenses, but low unit production. New defensive technologies have been discovered in the defenses that we haven't yet researched. How can we break through the enemy's defenses? Maybe we should [accent]bypass them[]?

sector.eec-Mountain-barrier.name = Mountain Barrier
sector.eec-Mountain-barrier.description = A mountainous sector that creates a natural barrier between the [accent]Swamp[] and the [accent]Citadel[]. This area contains an enemy base with a large amount of production. \nDestroy this barrier to open a direct path from the [accent]Swamp[] to the [accent]Citadel[].

sector.eec-Grott.name = Grott
sector.eec-Grott.description = Intelligence showed that the enemy has a large production capacity of Tier 1-3 units, so they will apply constant pressure. \n\nTitan attacks weakly and infrequently, and its Sublimates have a short range... However, there's a [accent]Malign[] turret. Maybe it will help?...

sector.eec-export-station.name = Export Station
sector.eec-export-station.description = The main trade route passed through this sector before the discovery of the [accent]Ravine[]. The enemy built a small station here, where convoys could rest and where resources were prepared for export to other sectors. After the discovery of the [accent]Ravine[], this sector fell out of favor; however, despite this, all production and defenses are functioning perfectly. Capture this outpost. \n\nAfter capturing the main trade route, the enemy urgently needed an alternative, so they returned to the old routes that pass through this sector. This means there is a risk of encountering enemy convoys or other reinforcements sent to this sector.

